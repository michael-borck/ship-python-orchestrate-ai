project:
  type: book
  output-dir: _book

book:
  title: "Ship Python, Orchestrate AI"
  subtitle: "Professional Python in the AI Era"
  favicon: favicon.svg
  author: "Michael Borck"
  date: "last-modified"
  license: "CC BY 4.0 (content), MIT (code examples)"
  chapters:
    - index.qmd
    - copyright.qmd
    - chapters/foundation.qmd
    - chapters/workflow.qmd
    - chapters/documentation.qmd
    - chapters/case-study.qmd
    - chapters/advanced-techniques.qmd
    - chapters/project-management.qmd
    - chapters/distribution.qmd
    - chapters/notebooks.qmd
    - chapters/notebook-case-study.ipynb
    - chapters/conclusion.qmd
    - acknowledgments.qmd
    - about-author.qmd
  appendices:
    - appendices/glossary.qmd
    - appendices/distribution-templates.qmd
    - appendices/ai-tools.qmd
    - appendices/checklist.qmd
    - appendices/editors.qmd
    - appendices/tools.qmd
    - appendices/tool-comparision.qmd
    - appendices/bash-scaffold-script.qmd
    - appendices/cookiecutter.qmd
    - appendices/hatch.qmd
    - appendices/conda.qmd
    - appendices/venv.qmd
    - appendices/uv.qmd
    - appendices/poetry.qmd
    - appendices/pdm.qmd
  repo-url: https://github.com/michael-borck/ship-python-orchestrate-ai
  repo-actions: [edit, issue]
  other-links:
    - text: Download PDF
      icon: file-pdf
      href: ship-python-orchestrate-ai.pdf
    - text: Download EPUB
      icon: book
      href: ship-python-orchestrate-ai.epub
    - text: Download llm.txt
      icon: robot
      href: llm.txt
    - text: GitHub
      icon: github
      href: https://github.com/michael-borck/ship-python-orchestrate-ai
    - text: DeepWiki
      icon: search
      href: https://deepwiki.com/michael-borck/ship-python-orchestrate-ai
    - text: All Books
      icon: collection
      href: https://books.borck.education

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    cover-image: images/cover.png
    css: styles.css
    include-after-body: chatbot.html
    code-copy: true
    highlight-style: github
    toc: true
    toc-depth: 3
    number-sections: true

execute:
  enabled: false
  freeze: auto
